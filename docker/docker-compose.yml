services:
  gtfs_db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - gtfs_pg:/var/lib/postgresql/data
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 30
  
  migrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.migrator
    depends_on:
      gtfs_db:
        condition: service_healthy
    secrets:
      - db_password
    environment:
      DB_PASSWORD_FILE: /run/secrets/db_password
      DB_HOST: gtfs_db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
    restart: "no"

  redis:
    image: redis:7-alpine
    command: redis-server --aclfile /usr/local/etc/redis/users.acl
    volumes:
      - ../redis/users.acl:/usr/local/etc/redis/users.acl:ro

  gtfs_importer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.importer
    restart: unless-stopped
    depends_on:
      gtfs_db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    secrets:
      - db_password_importer
      - redis_password
    environment:
      DB_PASSWORD_FILE: /run/secrets/db_password_importer
      DB_HOST: gtfs_db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${IMPORTER_USER}
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      REDIS_USERNAME: ${REDIS_USER}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ../data:/app/data

  rt_poller:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rt_poller
    restart: unless-stopped
    depends_on:
      gtfs_db:
        condition: service_healthy
      redis:
        condition: service_started
      gtfs_importer:
        condition: service_started
      migrator:
        condition: service_completed_successfully
    secrets:
      - db_password_api
      - redis_password
    environment:
      DB_PASSWORD_FILE: /run/secrets/db_password_api
      DB_HOST: gtfs_db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${API_READER_USER}
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      REDIS_USERNAME: ${REDIS_USER}
      REDIS_HOST: redis
      REDIS_PORT: 6379

  stop_writer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.stop_writer
    restart: unless-stopped
    depends_on:
      gtfs_db:
        condition: service_healthy
      redis:
        condition: service_started
      gtfs_importer:
        condition: service_started
      migrator:
        condition: service_completed_successfully
    secrets:
      - db_password_writer
      - redis_password
    environment:
      DB_PASSWORD_FILE: /run/secrets/db_password_writer
      DB_HOST: gtfs_db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${WRITER_USER}
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      REDIS_USERNAME: ${REDIS_USER}
      REDIS_HOST: redis
      REDIS_PORT: 6379

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    depends_on:
      gtfs_db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    secrets:
      - db_password_api
      - redis_password
    environment:
      DB_PASSWORD_FILE: /run/secrets/db_password_api
      DB_HOST: gtfs_db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${API_READER_USER}
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      REDIS_USERNAME: ${REDIS_USER}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      api:
        condition: service_healthy

secrets:
  db_password:
    file: ../secrets/db_password
  db_password_api:
    file: ../secrets/db_password_api
  db_password_writer:
    file: ../secrets/db_password_writer
  db_password_importer:
    file: ../secrets/db_password_importer
  redis_password:
    file: ../secrets/redis_password

volumes:
  gtfs_pg:
  caddy_data:
  caddy_config:
